name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: documentations/package-lock.json

      - name: Install dependencies
        working-directory: ./documentations
        run: npm install

      - name: Build website
        working-directory: ./documentations
        # הוספנו דגל שמתעלם משגיאות TypeScript בזמן ה-Build כדי שלא יקרוס על ה-creds.json החסר
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./documentations/build